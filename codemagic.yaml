workflows:
  ios-release:
    name: iOS Release - Calculadora CETIS 131
    max_build_duration: 60
    environment:
      flutter: stable
      xcode: latest
      cocoapods: default
    scripts:
      - name: Get Flutter packages
        script: flutter pub get
      - name: Generate iOS project files
        script: |
          flutter create --platforms=ios .
      - name: Install pods
        script: |
          cd ios && pod install
      - name: Build IPA (no code sign)
        script: |
          flutter build ios --release --no-codesign
      - name: Archive IPA unsigned
        script: |
          cd build/ios/iphoneos
          mkdir -p Payload
          cp -r Runner.app Payload/
          zip -r CalcCientificaCETIS131.ipa Payload
    artifacts:
      - build/ios/iphoneos/CalcCientificaCETIS131.ipa
    publishing:
      email:
        recipients:
          - miguelchavezgonzaga@gmail.com
        notify:
          success: true
          failure: true
